<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Animations</title>
    <style>
      h1 {
        text-align: center;
        background: linear-gradient(135deg, cyan, blue, cyan, blue);
        color: black;
      }
      html, body {
        height: 100%;
      body {
        background: linear-gradient(135deg, gray, white);
        color: cyan;
        background-repeat: no-repeat;
        background-size: cover;
        background-attachment: fixed;
      }
      a {
        background: purple;
        color: white;
        font-size: 20px;
      }
      p {
        background: blue;
        color: white;
        font-size: 10px;
      }
      p:hover {
        font-size: 20px;
        background: cyan;
        color: black;
      }
    </style>
  </head>
  <body>
    <h1>Mark's Animations.</h1>
    <hr>
    <p>This page is NOT DONE.</p>
  </body>
</html>
